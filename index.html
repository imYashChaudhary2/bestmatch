<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BestMatch — Mobile Comparison</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="site.webmanifest">
</head>
<body data-category="mobile">

  <header>
    <a href="index.html" class="logo">Best<span class="logo-dot">Match</span></a>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Mobiles</a></li>
        <li><a href="tablet.html">Tablets</a></li>
        <li><a href="laptop.html">Laptops</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <span class="ai-badge"><span class="ai-dot"></span> AI-Powered</span>
      <h2>Compare Any <span>Smartphone</span></h2>
      <p>Search any phone in the world — specs fetched live by AI, not a static database</p>
    </section>

    <div class="comparison-container">
      <div class="product-comparison">

        <!-- Card 1 -->
        <div class="product-card">
          <div class="card-header">
            <div class="card-image-wrap">
              <div class="placeholder-icon">📱</div>
            </div>
            <div class="device-search-wrap">
              <span class="search-icon">🔍</span>
              <input class="device-search" type="text" placeholder="Search any phone… e.g. iPhone 16 Pro" autocomplete="off">
              <div class="suggestions-list"></div>
            </div>
          </div>
          <div class="card-specs"></div>
        </div>

        <!-- Card 2 -->
        <div class="product-card">
          <div class="card-header">
            <div class="card-image-wrap">
              <div class="placeholder-icon">📱</div>
            </div>
            <div class="device-search-wrap">
              <span class="search-icon">🔍</span>
              <input class="device-search" type="text" placeholder="Search any phone… e.g. Samsung S25 Ultra" autocomplete="off">
              <div class="suggestions-list"></div>
            </div>
          </div>
          <div class="card-specs"></div>
        </div>

        <!-- Card 3 -->
        <div class="product-card">
          <div class="card-header">
            <div class="card-image-wrap">
              <div class="placeholder-icon">📱</div>
            </div>
            <div class="device-search-wrap">
              <span class="search-icon">🔍</span>
              <input class="device-search" type="text" placeholder="Search any phone… e.g. Google Pixel 9 Pro" autocomplete="off">
              <div class="suggestions-list"></div>
            </div>
          </div>
          <div class="card-specs"></div>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <p>© 2025 BestMatch — Specs powered by AI · Compare smarter</p>
  </footer>

  <script src="bestmatch.js"></script>
</body>
</html>
